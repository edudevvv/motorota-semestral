<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoRota — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --vermelho: #e8321a;
  --laranja: #ff6b00;
  --amarelo: #ffd600;
  --escuro: #0d0d0d;
  --cinza-escuro: #161616;
  --cinza-medio: #222222;
  --cinza-claro: #333333;
  --texto: #f0ede8;
  --texto-muted: #777;
  --verde: #3ddc84;
  --azul: #4da6ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--escuro);
  color: var(--texto);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .icon { font-size: 64px; margin-bottom: 8px; }
.login-logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 4px;
  color: var(--amarelo);
  text-shadow: 3px 3px 0 var(--vermelho);
}
.login-logo p {
  color: var(--texto-muted);
  font-size: 14px;
  margin-top: 4px;
}
.login-card {
  background: var(--cinza-escuro);
  border: 1px solid var(--cinza-claro);
  border-radius: 14px;
  padding: 32px;
}
.login-card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--amarelo);
  margin-bottom: 20px;
  text-align: center;
}
.input-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
}
.input-group label {
  font-size: 11px;
  font-weight: 700;
  color: var(--texto-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.input-group input {
  background: var(--cinza-medio);
  border: 1px solid var(--cinza-claro);
  border-radius: 8px;
  color: var(--texto);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.input-group input:focus { border-color: var(--laranja); }
.input-group input::placeholder { color: #444; }
.btn-login {
  width: 100%;
  background: var(--vermelho);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-login:hover { background: #c82a12; transform: translateY(-1px); }
.erro-msg {
  background: rgba(232,50,26,0.15);
  border: 1px solid var(--vermelho);
  color: var(--vermelho);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
  margin-bottom: 16px;
}
.credenciais {
  margin-top: 24px;
  background: var(--cinza-medio);
  border: 1px solid var(--cinza-claro);
  border-radius: 10px;
  padding: 16px;
}
.credenciais h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  color: var(--texto-muted);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.cred-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.cred-item:hover { background: var(--cinza-claro); }
.cred-item:last-child { margin-bottom: 0; }
.cred-item .tipo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 4px;
}
.cred-item .tipo-rest { background: rgba(232,50,26,0.2); color: var(--vermelho); }
.cred-item .tipo-moto { background: rgba(61,220,132,0.2); color: var(--verde); }
.cred-info { color: var(--texto-muted); font-size: 12px; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-logo">
    <div class="icon">🏍️</div>
    <h1>MOTOROTA</h1>
    <p>Sistema de Entregas Inteligente</p>
  </div>

  <div class="login-card">
    <h2>Entrar no Sistema</h2>

    {% if erro %}
    <div class="erro-msg">{{ erro }}</div>
    {% endif %}

    <form method="POST">
      <div class="input-group">
        <label>Usuario</label>
        <input type="text" name="username" id="username" placeholder="Ex: restaurante" autofocus>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
      </div>
      <button type="submit" class="btn-login">ENTRAR</button>
    </form>

    <div class="credenciais">
      <h3>Credenciais de Acesso</h3>
      <div class="cred-item" onclick="preencherLogin('restaurante','rest123')">
        <div>
          <div><strong>restaurante</strong> / rest123</div>
          <div class="cred-info">Gerenciar cardapio e pedidos</div>
        </div>
        <span class="tipo tipo-rest">RESTAURANTE</span>
      </div>
      <div class="cred-item" onclick="preencherLogin('motoboy','moto123')">
        <div>
          <div><strong>motoboy</strong> / moto123</div>
          <div class="cred-info">Aceitar rotas e entregas</div>
        </div>
        <span class="tipo tipo-moto">MOTOBOY</span>
      </div>
    </div>
  </div>
</div>

<script>
function preencherLogin(user, pass) {
  document.getElementById('username').value = user;
  document.getElementById('senha').value = pass;
}
</script>
</body>
</html>
